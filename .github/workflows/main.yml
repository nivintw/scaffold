# Main pipeline: on every push to main, run the SAME quality gate as PRs (ci.yml), then —
# only here, and only if the gate is green — the release-please stage.
#
# RELEASE FLOW (release-please, manifest mode — single package, release-type `simple` →
# bare `vX.Y.Z` tags):
#   1. On push to main, release-please maintains a Release PR that bumps the version +
#      CHANGELOG.md.
#   2. That Release PR is AUTO-MERGED (`--auto --rebase`) the moment its required checks
#      pass, so releases are continuous: release-please then cuts the `vX.Y.Z` tag + GitHub
#      Release. Copier consumers pin a release with `copier copy --vcs-ref vX.Y.Z` /
#      `copier update`.
#   3. The release job gates on `needs: [ci, preflight]`, so a tag is never cut on a red
#      gate. The `ci` job here reuses ci.yml — the exact gate PRs run.
#
# Auth: a release GitHub App, NOT the default GITHUB_TOKEN — an App token is a distinct
# actor, so the Release PR runs CI and (because the auto-merge is performed as the App)
# merging it triggers this workflow again to cut the tag + release. The release SKIPS
# cleanly until the App's CI_CLIENT_ID (variable) + CI_APP_PRIVATE_KEY (secret) exist (see
# the preflight job), so pushing to main is always safe.
#
# REPO SETTINGS the auto-merge depends on (managed centrally for this repo):
#   - "Allow auto-merge" enabled, and "Allow rebase merging" (this repo's only merge method;
#     the auto-merge step uses `--rebase` to match).
#   - The App (Contents + Pull requests: read/write) in the bypass list of the ruleset
#     protecting main. That ruleset must gate releases on REQUIRED STATUS CHECKS, not a human
#     approving review: the App authored the Release PR and GitHub forbids approving your own
#     PR, so a required review would deadlock auto-merge. `--auto` also needs at least one
#     required check to exist, or it errors.

name: main

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

# Serialize release runs so overlapping merges can't race release-please.
concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  # The same gate PRs run. The caller job is named `ci` so its check-runs report as
  # `ci / <job>` — matching what the ruleset requires and what PRs produce via pr.yml.
  ci:
    uses: ./.github/workflows/ci.yml

  # Guard: the release job needs the App's Client ID + private key. A secret can't be read
  # in a job-level `if:`, so a step (which CAN see them) reports whether BOTH are present,
  # and the release job gates on that output. Until both are set, release SKIPS cleanly
  # (green run, no failure); set them and auto-release activates itself.
  preflight:
    runs-on: ubuntu-latest
    outputs:
      release_enabled: ${{ steps.check.outputs.enabled }}
    steps:
      - id: check
        env:
          CI_CLIENT_ID: ${{ vars.CI_CLIENT_ID }}
          CI_APP_PRIVATE_KEY: ${{ secrets.CI_APP_PRIVATE_KEY }}
        run: |
          missing=""
          [ -z "$CI_CLIENT_ID" ] && missing="$missing CI_CLIENT_ID(variable)"
          [ -z "$CI_APP_PRIVATE_KEY" ] && missing="$missing CI_APP_PRIVATE_KEY(secret)"
          if [ -z "$missing" ]; then
            echo "enabled=true" >>"$GITHUB_OUTPUT"
          else
            echo "enabled=false" >>"$GITHUB_OUTPUT"
            echo "::notice::Release skipped — missing:$missing. Set them to enable auto-release."
          fi

  release:
    needs: [ci, preflight]
    if: needs.preflight.outputs.release_enabled == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Mint a token for the release App (the ruleset bypass actor)
        id: app-token
        uses: actions/create-github-app-token@fee1f7d63c2ff003460e3d139729b119787bc349 # v2.2.2
        with:
          # `app-id` accepts the App's Client ID as well as the numeric App ID
          # (create-github-app-token supports both); the Client ID is non-secret, hence a var.
          app-id: ${{ vars.CI_CLIENT_ID }}
          private-key: ${{ secrets.CI_APP_PRIVATE_KEY }}
          # Scope the token to exactly what release-please needs: the bump commit + tag +
          # release (contents) and the Release PR (pull-requests).
          permission-contents: write
          permission-pull-requests: write

      - name: Run release-please (Release PR, tag, release)
        id: release
        uses: googleapis/release-please-action@5c625bfb5d1ff62eadeeb3772007f7f66fdcf071 # v4.4.1
        with:
          token: ${{ steps.app-token.outputs.token }}
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

      # Continuous release: when release-please opens/updates a Release PR, enable
      # auto-merge so it lands (rebase) once required checks pass — no standing PR, no
      # manual step. On the next run (a release was cut, no PR) `pr` is empty and this
      # skips. PR JSON travels via env, never inline `${{ }}`, to dodge script injection.
      - name: Auto-merge the Release PR
        if: ${{ steps.release.outputs.pr }}
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          RELEASE_PR: ${{ steps.release.outputs.pr }}
        run: gh pr merge "$(printf '%s' "$RELEASE_PR" | jq -r '.number')" --auto --rebase
