# Dead-link check for this template repo's own Markdown (README, REVIEW, docs). Mirrors the
# link-check.yml.jinja shipped into generated repos — link checking is a network operation, so
# it's its own workflow, separate from the deterministic render-matrix gate in ci.yml.

name: link-check

on:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  lychee:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - name: Check links (lychee)
        uses: lycheeverse/lychee-action@8646ba30535128ac92d33dfc9133794bfdd9b411 # v2.8.0
        with:
          # lychee excludes mailto: links by default; scope to Markdown so LICENSES/lockfiles
          # aren't crawled. Exclude our own GitHub Pages site: the README links to it but it
          # only goes live after this docs change merges (Pages deploys from main /docs), so
          # link-checking it on the PR would 404 on a page we are in the act of publishing.
          args: "--no-progress --exclude 'nivintw\\.github\\.io/copier-everything' '**/*.md'"
          fail: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
