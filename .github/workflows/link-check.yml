# Dead-link check for this template repo's own Markdown (README, REVIEW, docs). Mirrors the
# link-check.yml.jinja shipped into generated repos — link checking is a network operation, so
# it's its own workflow, separate from the deterministic render-matrix gate in ci.yml.

name: link-check

on:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  lychee:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - name: Check links (lychee)
        uses: lycheeverse/lychee-action@8646ba30535128ac92d33dfc9133794bfdd9b411 # v2.8.0
        with:
          # lychee excludes mailto: by default; scope to Markdown so LICENSES/lockfiles aren't
          # crawled. Excludes — our Pages site, our own /compare/ URLs, the private
          # nivintw/repo-management repo, and the REUSE badge /info/ endpoint (all valid but
          # unverifiable from a PR) — live in .config/lychee.toml, passed via --config so all
          # excludes share one source. See that file for the per-host rationale.
          args: "--no-progress --config .config/lychee.toml '**/*.md'"
          fail: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
