# CI for the scaffold template ITSELF: render every shape in tests/answers/ and run the
# full quality gate on each generated project (tests/render-matrix.sh). This is what
# proves a template change doesn't break any supported project shape.

name: ci

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  render-matrix:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - name: Set up uv (+ managed Python)
        uses: astral-sh/setup-uv@d0cc045d04ccac9d8b7881df0226f9e82c39688e # v6.8.0
        with:
          enable-cache: true

      - name: Install Python CLI tools (copier, reuse)
        run: |
          mkdir -p "$HOME/.local/bin"
          uv tool install copier
          uv tool install reuse
          echo "$HOME/.local/bin" >>"$GITHUB_PATH"

      - name: Install bats
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq bats

      - name: Install helm (for the full-modules shape's helm lint)
        uses: azure/setup-helm@1a275c3b69536ee54be43f2070a358922e12c8d4 # v4.3.1

      - name: Install hawkeye + taplo (pinned, matching the template's CI)
        run: |
          set -euo pipefail
          # renovate: datasource=github-releases depName=korandoru/hawkeye
          curl -fsSL https://github.com/korandoru/hawkeye/releases/download/v6.5.1/hawkeye-x86_64-unknown-linux-gnu.tar.xz \
            | tar -xJ --strip-components=1 -C "$HOME/.local/bin" hawkeye-x86_64-unknown-linux-gnu/hawkeye
          # renovate: datasource=github-releases depName=tamasfe/taplo
          curl -fsSL https://github.com/tamasfe/taplo/releases/download/0.10.0/taplo-linux-x86_64.gz \
            | gunzip -c >"$HOME/.local/bin/taplo"
          chmod +x "$HOME/.local/bin/hawkeye" "$HOME/.local/bin/taplo"
          # Fail loudly if a pinned release URL 404s and the pipe yielded an empty binary.
          test -s "$HOME/.local/bin/hawkeye" && "$HOME/.local/bin/hawkeye" --help >/dev/null
          test -s "$HOME/.local/bin/taplo" && "$HOME/.local/bin/taplo" --version >/dev/null

      - name: Install trivy + osv-scanner (terraform IaC + dependency CVE scans)
        env:
          # renovate: datasource=github-releases depName=aquasecurity/trivy
          TRIVY_VERSION: "0.71.2"
          # renovate: datasource=github-releases depName=google/osv-scanner
          OSV_VERSION: "2.4.0"
        run: |
          set -euo pipefail
          curl -fsSL "https://github.com/aquasecurity/trivy/releases/download/v${TRIVY_VERSION}/trivy_${TRIVY_VERSION}_Linux-64bit.tar.gz" \
            | tar -xz -C "$HOME/.local/bin" trivy
          curl -fsSL "https://github.com/google/osv-scanner/releases/download/v${OSV_VERSION}/osv-scanner_linux_amd64" \
            -o "$HOME/.local/bin/osv-scanner"
          chmod +x "$HOME/.local/bin/trivy" "$HOME/.local/bin/osv-scanner"
          test -s "$HOME/.local/bin/trivy" && "$HOME/.local/bin/trivy" --version >/dev/null
          test -s "$HOME/.local/bin/osv-scanner" && "$HOME/.local/bin/osv-scanner" --version >/dev/null

      - name: Render every shape + run the full gate
        run: tests/render-matrix.sh

  # Lint + security-audit the template repo's OWN workflow(s). The GENERATED workflows are
  # covered by render-matrix (actionlint/zizmor run as prek hooks on each rendered shape);
  # this job is the dogfood for this very file. Same pinned tools, via uvx — no Docker.
  lint-workflows:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - name: Set up uv
        uses: astral-sh/setup-uv@d0cc045d04ccac9d8b7881df0226f9e82c39688e # v6.8.0

      - name: Lint workflows (actionlint)
        # shellcheck-py gives actionlint a shellcheck for `run:` blocks without a system install.
        run: uvx --from actionlint-py==1.7.12.24 --with shellcheck-py actionlint

      - name: Audit workflows (zizmor — online, full coverage)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: uvx zizmor@1.26.1 --no-progress .github/workflows
