# CI for the scaffold template ITSELF: render every shape in tests/answers/ and run the
# full quality gate on each generated project (tests/render-matrix.sh). This is what
# proves a template change doesn't break any supported project shape.

name: ci

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  render-matrix:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - name: Set up uv (+ managed Python)
        uses: astral-sh/setup-uv@d0cc045d04ccac9d8b7881df0226f9e82c39688e # v6.8.0
        with:
          enable-cache: true

      - name: Install Python CLI tools (copier, reuse)
        run: |
          mkdir -p "$HOME/.local/bin"
          uv tool install copier
          uv tool install reuse
          echo "$HOME/.local/bin" >>"$GITHUB_PATH"

      - name: Install bats
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq bats

      - name: Install helm (for the full-modules shape's helm lint)
        uses: azure/setup-helm@1a275c3b69536ee54be43f2070a358922e12c8d4 # v4.3.1

      - name: Install hawkeye + taplo (pinned, matching the template's CI)
        run: |
          set -euo pipefail
          # renovate: datasource=github-releases depName=korandoru/hawkeye
          curl -fsSL https://github.com/korandoru/hawkeye/releases/download/v6.5.1/hawkeye-x86_64-unknown-linux-gnu.tar.xz \
            | tar -xJ --strip-components=1 -C "$HOME/.local/bin" hawkeye-x86_64-unknown-linux-gnu/hawkeye
          # renovate: datasource=github-releases depName=tamasfe/taplo
          curl -fsSL https://github.com/tamasfe/taplo/releases/download/0.10.0/taplo-linux-x86_64.gz \
            | gunzip -c >"$HOME/.local/bin/taplo"
          chmod +x "$HOME/.local/bin/hawkeye" "$HOME/.local/bin/taplo"
          # Fail loudly if a pinned release URL 404s and the pipe yielded an empty binary.
          test -s "$HOME/.local/bin/hawkeye" && "$HOME/.local/bin/hawkeye" --help >/dev/null
          test -s "$HOME/.local/bin/taplo" && "$HOME/.local/bin/taplo" --version >/dev/null

      - name: Install trivy + osv-scanner (terraform IaC + dependency CVE scans)
        env:
          # renovate: datasource=github-releases depName=aquasecurity/trivy
          TRIVY_VERSION: "0.71.2"
          # renovate: datasource=github-releases depName=google/osv-scanner
          OSV_VERSION: "2.4.0"
        run: |
          set -euo pipefail
          curl -fsSL "https://github.com/aquasecurity/trivy/releases/download/v${TRIVY_VERSION}/trivy_${TRIVY_VERSION}_Linux-64bit.tar.gz" \
            | tar -xz -C "$HOME/.local/bin" trivy
          curl -fsSL "https://github.com/google/osv-scanner/releases/download/v${OSV_VERSION}/osv-scanner_linux_amd64" \
            -o "$HOME/.local/bin/osv-scanner"
          chmod +x "$HOME/.local/bin/trivy" "$HOME/.local/bin/osv-scanner"
          test -s "$HOME/.local/bin/trivy" && "$HOME/.local/bin/trivy" --version >/dev/null
          test -s "$HOME/.local/bin/osv-scanner" && "$HOME/.local/bin/osv-scanner" --version >/dev/null

      - name: Render every shape + run the full gate
        run: tests/render-matrix.sh

  # Lint the template repo's OWN files with the same prek hooks the generated projects use
  # (the applicable subset — see .pre-commit-config.yaml: no Python/SQL/etc. hooks here, and
  # licensing is verified per-render by render-matrix, not at this repo's root). The
  # GENERATED files are covered by render-matrix; this is the dogfood gate for this repo.
  # actionlint + zizmor (offline) run as prek hooks; the online zizmor step adds the network
  # audits (known-vulnerable-actions, ref-confusion) that the offline hook can't do.
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - name: Set up uv
        uses: astral-sh/setup-uv@d0cc045d04ccac9d8b7881df0226f9e82c39688e # v6.8.0
        with:
          enable-cache: true

      - name: Cache prek hook environments
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: ~/.cache/prek
          key: prek-${{ hashFiles('.pre-commit-config.yaml') }}
          # Reuse the prior cache on a hook bump so only the changed env reinstalls.
          restore-keys: |
            prek-

      - name: Install taplo (pinned; the taplo hook is language:system)
        run: |
          set -euo pipefail
          mkdir -p "$HOME/.local/bin"
          # renovate: datasource=github-releases depName=tamasfe/taplo
          curl -fsSL https://github.com/tamasfe/taplo/releases/download/0.10.0/taplo-linux-x86_64.gz \
            | gunzip -c >"$HOME/.local/bin/taplo"
          chmod +x "$HOME/.local/bin/taplo"
          echo "$HOME/.local/bin" >>"$GITHUB_PATH"
          # Fail loudly if the pinned release URL 404s and the pipe yielded an empty binary.
          test -s "$HOME/.local/bin/taplo" && "$HOME/.local/bin/taplo" --version >/dev/null

      - name: Run prek hooks (same as local; taplo + zizmor run as their own steps below)
        env:
          # taplo is a system hook (its own step); zizmor runs online below (a superset of
          # the hook's offline pass); no-commit-to-branch is a local-only guard.
          SKIP: taplo,zizmor,no-commit-to-branch
        run: uvx prek run --all-files

      - name: Check TOML formatting (taplo)
        run: taplo fmt --check --diff

      - name: Audit workflows (zizmor — online, full coverage)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: uvx zizmor@1.26.1 --no-progress .github/workflows

  # Single required status check for branch protection. repo-management requires the context
  # "ci / lint-and-test" across every managed repo (the name a generated repo's reusable
  # ci.yml reports). This repo's CI is split into render-matrix + lint, so this aggregator
  # reports that one context and is green ONLY when both real jobs succeed — the template
  # dogfooding the very gate it hands its children. `if: always()` + an explicit result
  # check means it always reports a definitive pass/fail (a skipped required check would
  # otherwise wedge branch protection).
  lint-and-test:
    needs: [render-matrix, lint]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Gate on render-matrix + lint
        env:
          RENDER_MATRIX: ${{ needs.render-matrix.result }}
          LINT: ${{ needs.lint.result }}
        run: |
          if [ "$RENDER_MATRIX" != "success" ] || [ "$LINT" != "success" ]; then
            echo "Required job failed: render-matrix=$RENDER_MATRIX lint=$LINT"
            exit 1
          fi
          echo "render-matrix + lint passed"
