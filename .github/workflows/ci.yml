# CI for the copier-everything template ITSELF: render every shape in tests/answers/ and run the
# full quality gate on each generated project (tests/render-matrix.sh). This is what
# proves a template change doesn't break any supported project shape.
#
# REUSABLE (on: workflow_call) — the triggers live in the callers, so a caller job named
# `ci` produces the check-run name `ci / <job>` (e.g. `ci / lint-and-test`), which is the
# context branch protection / the ruleset requires:
#   - pr.yml   (on: pull_request) → this gate. The open-PR pipeline.
#   - main.yml (on: push to main) → this gate, THEN the release-please stage.
# (A flat workflow's check-run name would be the bare job name, with no `ci /` prefix —
# which is why this MUST be reusable for the ruleset's `ci / lint-and-test` to match.)

name: ci

on:
  workflow_call:

permissions:
  contents: read

jobs:
  render-matrix:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - name: Set up uv (+ managed Python)
        uses: astral-sh/setup-uv@d0cc045d04ccac9d8b7881df0226f9e82c39688e # v6.8.0
        with:
          enable-cache: true

      - name: Cache prek hook environments
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          # Each rendered shape runs the TEMPLATE's hook set, so key off that config (not
          # the root's). Without this the gate cold-bootstraps every hook env on every run.
          path: ~/.cache/prek
          key: prek-render-${{ hashFiles('template/.pre-commit-config.yaml.jinja') }}
          # Reuse the prior cache on a hook bump so only the changed env reinstalls.
          restore-keys: |
            prek-render-

      - name: Install Python CLI tools (copier, reuse)
        run: |
          mkdir -p "$HOME/.local/bin"
          uv tool install copier
          uv tool install reuse
          echo "$HOME/.local/bin" >>"$GITHUB_PATH"

      - name: Install bats
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq bats

      - name: Install helm (for the full-modules shape's helm-lint hook)
        uses: azure/setup-helm@1a275c3b69536ee54be43f2070a358922e12c8d4 # v4.3.1

      - name: Install terraform + tflint (for the full-modules shape's terraform hooks)
        uses: hashicorp/setup-terraform@b9cd54a3c349d3f38e8881555d616ced269862dd # v3.1.2
        with:
          # The wrapper breaks the terraform_validate hook's output parsing — see ci.yml.jinja.
          terraform_wrapper: false
      - uses: terraform-linters/setup-tflint@b480b8fcdaa6f2c577f8e4fa799e89e756bb7c93 # v6.2.2

      - name: Install hawkeye + taplo (pinned + checksum-verified, matching the template's CI)
        env:
          # renovate: datasource=github-releases depName=korandoru/hawkeye
          HAWKEYE_VERSION: "6.5.1"
          HAWKEYE_SHA256: "d6eb0505a45a15244f4f789158aafe5e3f1a7dc86c9dc1d7651f3cb1e1b321e0"  # gitleaks:allow
          # renovate: datasource=github-releases depName=tamasfe/taplo
          TAPLO_VERSION: "0.10.0"
          # taplo ships no upstream checksum file; this SHA is computed from the asset.
          TAPLO_SHA256: "8fe196b894ccf9072f98d4e1013a180306e17d244830b03986ee5e8eabeb6156"  # gitleaks:allow
        run: |
          set -euo pipefail
          # Download the published asset, verify its SHA256, THEN extract (a tampered/MITM'd
          # or truncated download fails closed instead of executing). SHAs are kept current
          # with the versions by scripts/refresh-binary-checksums.sh.
          curl -fsSL "https://github.com/korandoru/hawkeye/releases/download/v${HAWKEYE_VERSION}/hawkeye-x86_64-unknown-linux-gnu.tar.xz" \
            -o "$RUNNER_TEMP/hawkeye.tar.xz"
          echo "${HAWKEYE_SHA256}  $RUNNER_TEMP/hawkeye.tar.xz" | sha256sum -c -
          tar -xJ --strip-components=1 -C "$HOME/.local/bin" -f "$RUNNER_TEMP/hawkeye.tar.xz" hawkeye-x86_64-unknown-linux-gnu/hawkeye
          curl -fsSL "https://github.com/tamasfe/taplo/releases/download/${TAPLO_VERSION}/taplo-linux-x86_64.gz" \
            -o "$RUNNER_TEMP/taplo.gz"
          echo "${TAPLO_SHA256}  $RUNNER_TEMP/taplo.gz" | sha256sum -c -
          gunzip -c "$RUNNER_TEMP/taplo.gz" >"$HOME/.local/bin/taplo"
          chmod +x "$HOME/.local/bin/hawkeye" "$HOME/.local/bin/taplo"

      - name: Install trivy + osv-scanner (terraform IaC + dependency CVE scans)
        env:
          # renovate: datasource=github-releases depName=aquasecurity/trivy
          TRIVY_VERSION: "0.71.2"
          TRIVY_SHA256: "0510e71e2fd39bf863856d499c8dc19feb4e7336546394c502a8f5cc7ab27460"  # gitleaks:allow
          # renovate: datasource=github-releases depName=google/osv-scanner
          OSV_VERSION: "2.4.0"
          # The published osv-scanner asset is the bare binary, so this checksums it directly.
          OSV_SHA256: "15314940c10d26af9c6649f150b8a47c1262e8fc7e17b1d1029b0e479e8ed8a0"  # gitleaks:allow
        run: |
          set -euo pipefail
          curl -fsSL "https://github.com/aquasecurity/trivy/releases/download/v${TRIVY_VERSION}/trivy_${TRIVY_VERSION}_Linux-64bit.tar.gz" \
            -o "$RUNNER_TEMP/trivy.tar.gz"
          echo "${TRIVY_SHA256}  $RUNNER_TEMP/trivy.tar.gz" | sha256sum -c -
          tar -xz -C "$HOME/.local/bin" -f "$RUNNER_TEMP/trivy.tar.gz" trivy
          curl -fsSL "https://github.com/google/osv-scanner/releases/download/v${OSV_VERSION}/osv-scanner_linux_amd64" \
            -o "$HOME/.local/bin/osv-scanner"
          echo "${OSV_SHA256}  $HOME/.local/bin/osv-scanner" | sha256sum -c -
          chmod +x "$HOME/.local/bin/trivy" "$HOME/.local/bin/osv-scanner"

      - name: Render every shape + run the full gate
        run: tests/render-matrix.sh

  # Lint the template repo's OWN files with the same prek hooks the generated projects use
  # (the applicable subset — see .pre-commit-config.yaml: no Python/SQL/etc. hooks here).
  # Licensing (hawkeye + reuse) DOES run on this repo's own files, governed by
  # .config/licenserc.toml + REUSE.toml; the GENERATED files' licensing is covered separately by
  # render-matrix. This is the dogfood gate for this repo.
  # actionlint + zizmor (offline) run as prek hooks; the online zizmor step adds the network
  # audits (known-vulnerable-actions, ref-confusion) that the offline hook can't do.
  # Finally it runs this repo's OWN Python suite (ruff/ty/pytest): the sync tests that keep the
  # root in step with the template, and the post-copy-task tests render-matrix.sh can't cover.
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - name: Set up uv
        uses: astral-sh/setup-uv@d0cc045d04ccac9d8b7881df0226f9e82c39688e # v6.8.0
        with:
          enable-cache: true

      - name: Cache prek hook environments
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: ~/.cache/prek
          key: prek-${{ hashFiles('.pre-commit-config.yaml') }}
          # Reuse the prior cache on a hook bump so only the changed env reinstalls.
          restore-keys: |
            prek-

      - name: Install taplo (pinned + checksum-verified; the taplo hook is language:system)
        env:
          # renovate: datasource=github-releases depName=tamasfe/taplo
          TAPLO_VERSION: "0.10.0"
          # taplo ships no upstream checksum file; this SHA is computed from the asset.
          TAPLO_SHA256: "8fe196b894ccf9072f98d4e1013a180306e17d244830b03986ee5e8eabeb6156"  # gitleaks:allow
        run: |
          set -euo pipefail
          mkdir -p "$HOME/.local/bin"
          curl -fsSL "https://github.com/tamasfe/taplo/releases/download/${TAPLO_VERSION}/taplo-linux-x86_64.gz" \
            -o "$RUNNER_TEMP/taplo.gz"
          echo "${TAPLO_SHA256}  $RUNNER_TEMP/taplo.gz" | sha256sum -c -
          gunzip -c "$RUNNER_TEMP/taplo.gz" >"$HOME/.local/bin/taplo"
          chmod +x "$HOME/.local/bin/taplo"
          echo "$HOME/.local/bin" >>"$GITHUB_PATH"

      - name: Run prek hooks (same as local; taplo + hawkeye + zizmor run as their own steps below)
        env:
          # taplo + hawkeye are system hooks (their own steps below); hawkeye-format mutates,
          # so CI runs the non-mutating `hawkeye check` instead. zizmor runs online below (a
          # superset of the hook's offline pass); no-commit-to-branch is a local-only guard.
          # (reuse stays in the prek run — it's check-only.)
          SKIP: taplo,hawkeye-format,zizmor,no-commit-to-branch
        run: uvx prek run --all-files

      - name: Check TOML formatting (taplo)
        run: taplo fmt --check --diff

      - name: Check SPDX license headers (hawkeye)
        env:
          # renovate: datasource=github-releases depName=korandoru/hawkeye
          HAWKEYE_VERSION: "6.5.1"
          HAWKEYE_SHA256: "d6eb0505a45a15244f4f789158aafe5e3f1a7dc86c9dc1d7651f3cb1e1b321e0"  # gitleaks:allow
        run: |
          set -euo pipefail
          curl -fsSL "https://github.com/korandoru/hawkeye/releases/download/v${HAWKEYE_VERSION}/hawkeye-x86_64-unknown-linux-gnu.tar.xz" \
            -o "$RUNNER_TEMP/hawkeye.tar.xz"
          echo "${HAWKEYE_SHA256}  $RUNNER_TEMP/hawkeye.tar.xz" | sha256sum -c -
          tar -xJ --strip-components=1 -C "$RUNNER_TEMP" -f "$RUNNER_TEMP/hawkeye.tar.xz" hawkeye-x86_64-unknown-linux-gnu/hawkeye
          chmod +x "$RUNNER_TEMP/hawkeye"
          "$RUNNER_TEMP/hawkeye" check --config .config/licenserc.toml

      - name: Audit workflows (zizmor — online, full coverage)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: uvx zizmor@1.26.1 --no-progress .github/workflows

      # This repo's own Python suite. `uv run` provisions the dev env (copier, pyjson5, pytest)
      # from uv.lock; ruff/ty/pytest use the locked versions. The sync tests render the template
      # (vcs_ref=HEAD) and compare against this repo's root, so they need the full checkout.
      - name: Lint, type-check + run the template's own test suite
        run: |
          uv run ruff check .
          uv run ruff format --check .
          uv run ty check .
          uv run pytest -n auto

  # Single required status check for branch protection. repo-management requires the context
  # "ci / lint-and-test" across every managed repo — the name produced when a caller job
  # `ci` invokes this reusable workflow's `lint-and-test` job. This repo's gate is split into
  # render-matrix + lint, so this aggregator job carries that required name and is green ONLY
  # when both real jobs succeed (the template dogfooding the gate it hands its children).
  # `if: always()` + an explicit result check means it always reports a definitive pass/fail
  # (a skipped required check would otherwise wedge branch protection).
  lint-and-test:
    needs: [render-matrix, lint]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Gate on render-matrix + lint
        env:
          RENDER_MATRIX: ${{ needs.render-matrix.result }}
          LINT: ${{ needs.lint.result }}
        run: |
          if [ "$RENDER_MATRIX" != "success" ] || [ "$LINT" != "success" ]; then
            echo "Required job failed: render-matrix=$RENDER_MATRIX lint=$LINT"
            exit 1
          fi
          echo "render-matrix + lint passed"
