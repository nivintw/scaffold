version = 1

# The Jinja template tree (template/**) carries SPDX headers whose `{{ license }}`
# placeholders only resolve at render time. `precedence = "override"` makes reuse use the
# license declared here instead of trying to parse those placeholders as SPDX expressions.
# The rendered output's real headers are verified per-shape by tests/render-matrix.sh.
[[annotations]]
path = "template/**"
precedence = "override"
SPDX-FileCopyrightText = "© 2026 Tyler Nivin"
SPDX-License-Identifier = "MIT"

# JSON has no comment syntax for an inline SPDX header (release-please's config + manifest).
[[annotations]]
path = ["**/*.json"]
SPDX-FileCopyrightText = "© 2026 Tyler Nivin"
SPDX-License-Identifier = "MIT"

# uv.lock is generated by `uv`, which rewrites it wholesale — a hand-added header wouldn't
# survive, so it's licensed here (the generated projects do the same; see test_synced_files).
[[annotations]]
path = ["uv.lock"]
SPDX-FileCopyrightText = "© 2026 Tyler Nivin"
SPDX-License-Identifier = "MIT"

# Empty marker file telling GitHub Pages to serve docs/ as-is (no Jekyll) — can't carry a
# header, and the HTML it protects contains literal Jinja examples Jekyll would otherwise mangle.
[[annotations]]
path = "docs/.nojekyll"
SPDX-FileCopyrightText = "© 2026 Tyler Nivin"
SPDX-License-Identifier = "MIT"
